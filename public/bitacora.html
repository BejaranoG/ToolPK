<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bitácora de Gestiones | ToolsPK</title>
<script>
(function(){
  try {
    var saved = localStorage.getItem('toolspk-theme');
    var theme = saved === 'dark' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', theme);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   PORTAL TOOLSPK — ESTILOS GLOBALES
═══════════════════════════════════════════════════ */
:root {
  --dark: #0a1520;
  --dark2: #0f1e2e;
  --blue: #0e5fa8;
  --blue2: #1a7dd4;
  --blue3: #3a9de8;
  --gold: #c9922a;
  --surface: #ffffff;
  --surface2: #f4f7fb;
  --border: #dce5f0;
  --ink: #1a2b3c;
  --muted: #6a85a0;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(14,95,168,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: "IBM Plex Sans", sans-serif; color: var(--ink); overflow: hidden; }

/* ── LAYOUT ── */
#app { display: flex; height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: 58px; min-width: 58px;
  background: var(--dark);
  display: flex; flex-direction: column;
  height: 100vh;
  transition: width 0.28s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}
.sidebar:hover { width: 240px; }

/* ── Label visibility ── */
.sidebar .sidebar-logo-name,
.sidebar .sidebar-logo-sub,
.sidebar .sidebar-section,
.sidebar .sidebar-footer,
.sidebar .nav-badge,
.sidebar .nav-item > span:not(.nav-icon) {
  opacity: 0;
  transition: opacity 0.18s ease;
  white-space: nowrap;
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar:hover .sidebar-logo-name,
.sidebar:hover .sidebar-logo-sub,
.sidebar:hover .sidebar-section,
.sidebar:hover .sidebar-footer,
.sidebar:hover .nav-badge,
.sidebar:hover .nav-item > span:not(.nav-icon) { opacity: 1; }

/* ── nav-item: fixed layout, icon never moves ── */
.sidebar .nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 0;
  margin: 2px 0;
  border-radius: 10px;
  cursor: pointer;
  color: rgba(255,255,255,0.55);
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  border: 1px solid transparent;
  white-space: nowrap;
  /* icon is always centered within 58px strip */
  padding-left: calc((58px - 30px) / 2);
  padding-right: 0;
  width: 100%;
}
.sidebar .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
.sidebar .nav-item.active { background: rgba(14,95,168,0.25); border-color: rgba(14,95,168,0.4); color: white; }

/* ── nav-icon: fixed 30px, never repositions ── */
.sidebar .nav-icon {
  width: 30px; height: 30px;
  min-width: 30px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  background: rgba(255,255,255,0.06);
  flex-shrink: 0;
  /* stays at same x position collapsed or expanded */
}
.sidebar .nav-item.active .nav-icon { background: rgba(14,95,168,0.4); }
.sidebar-logo {
  height: 240px;
  min-height: 240px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-logo-name {
  font-family: "Playfair Display", serif;
  font-size: 20px; color: white;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--blue), var(--blue3));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: white; font-weight: 700;
  font-family: "Playfair Display", serif;
  flex-shrink: 0;
}
.sidebar-logo-sub {
  font-size: 10px; color: rgba(255,255,255,0.3);
  letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px;
}
.sidebar-section {
  padding: 18px 16px 6px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.25); font-weight: 500;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 14px; margin: 2px 8px;
  border-radius: 10px; cursor: pointer;
  transition: all 0.15s; color: rgba(255,255,255,0.5);
  font-size: 13px; border: 1px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
.nav-item.active { background: rgba(14,95,168,0.25); border-color: rgba(14,95,168,0.4); color: white; }
.nav-icon {
  width: 30px; height: 30px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; background: rgba(255,255,255,0.07); flex-shrink: 0;
}
.nav-item.active .nav-icon { background: rgba(14,95,168,0.4); }
.nav-badge {
  font-size: 10px; padding: 2px 6px; border-radius: 10px;
  background: rgba(14,95,168,0.3); color: var(--blue3); font-weight: 600;
  margin-left: auto;
}
.sidebar-spacer { flex: 1; }
.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 10px; color: rgba(255,255,255,0.2);
  letter-spacing: 0.5px;
}

/* ── MAIN CONTENT ── */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.panels { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.panel.active { display: flex; }
.panel-scroll { flex: 1; overflow-y: auto; }

/* ── HOME ── */
.home-header {
  background: linear-gradient(105deg, var(--dark) 0%, #0e3a6a 60%, #1a5fa8 100%);
  padding: 44px 44px 52px; position: relative; overflow: hidden;
}
.home-header::after {
  content: ''; position: absolute; right: -60px; top: -60px;
  width: 280px; height: 280px; border-radius: 50%;
  background: radial-gradient(circle, rgba(14,95,168,0.3) 0%, transparent 70%);
}
.home-header-content { position: relative; z-index: 1; }
.home-greeting { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
.home-title { font-family: "Playfair Display", serif; font-size: 32px; color: white; font-weight: 400; line-height: 1.2; margin-bottom: 8px; }
.home-sub { font-size: 13px; color: rgba(255,255,255,0.45); }
.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; padding: 36px 44px; }
.tool-card {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px;
  cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.tool-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--blue3)); opacity: 0; transition: opacity 0.2s;
}
.tool-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(14,95,168,0.15); border-color: var(--blue3); }
.tool-card:hover::before { opacity: 1; }
.tool-card-icon { width: 52px; height: 52px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 18px; }
.tool-card-icon.blue { background: linear-gradient(135deg, #e8f2fc, #d0e8f8); }
.tool-card-icon.gold { background: linear-gradient(135deg, #fef5e7, #fde9c0); }
.tool-card-name { font-family: "Playfair Display", serif; font-size: 18px; color: var(--ink); margin-bottom: 8px; }
.tool-card-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }
.tool-card-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.tool-card-tag.ai { background: #e8f2fc; color: var(--blue); }
.tool-card-tag.calc { background: #fef5e7; color: var(--gold); }
.tool-card-arrow { position: absolute; bottom: 22px; right: 22px; width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--muted); transition: all 0.2s; }
.tool-card:hover .tool-card-arrow { background: var(--blue); color: white; }

/* ── TOOL HEADER BAR ── */
.tool-header {
  background: white; border-bottom: 1px solid var(--border);
  padding: 14px 28px; display: flex; align-items: center; gap: 14px;
  flex-shrink: 0;
}
.back-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 13px; border: 1px solid var(--border);
  border-radius: 8px; background: none; cursor: pointer;
  font-size: 12px; color: var(--muted);
  font-family: "IBM Plex Sans", sans-serif; transition: all 0.15s;
}
.back-btn:hover { background: var(--surface2); color: var(--ink); }
.tool-header-title { font-family: "Playfair Display", serif; font-size: 17px; color: var(--ink); }

/* ── PAGARE TOOL WRAPPER ── */
#panel-pagare .panel-scroll { background: #eef3f8; }

/* ── AFORO TOOL WRAPPER ── */
#panel-aforo .panel-scroll { background: #f5f2ed; }

/* ══════════════════════════════════════════════
   RESPONSIVE — MOBILE
══════════════════════════════════════════════ */
.hamburger-btn {
  display: none;
  position: fixed; top: 12px; left: 14px; z-index: 300;
  width: 38px; height: 38px;
  background: var(--dark); border: none; border-radius: 8px;
  cursor: pointer; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
}
.hamburger-btn span { display: block; width: 18px; height: 2px; background: #fff; border-radius: 2px; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 199; }
.sidebar-overlay.visible { display: block; }

@media (max-width: 768px) {
  .hamburger-btn { display: flex; }

  .sidebar {
    position: fixed !important;
    top: 0; bottom: 0;
    left: -260px;
    width: 240px !important; min-width: 240px !important;
    z-index: 200;
    transition: left 0.25s ease !important;
    overflow-y: auto;
  }
  /* On mobile: disable hover width change, only slide matters */
  .sidebar:hover { width: 240px !important; }
  .sidebar.open { left: 0 !important; }

  /* When open on mobile: show all labels */
  .sidebar.open .sidebar-logo-name,
  .sidebar.open .sidebar-logo-sub,
  .sidebar.open .sidebar-section,
  .sidebar.open .sidebar-footer,
  .sidebar.open .nav-badge,
  .sidebar.open .nav-item > span:not(.nav-icon) { opacity: 1 !important; }

  /* When open: fix nav-item layout to left-aligned with proper padding */
  .sidebar.open .nav-item {
    padding-left: 14px !important;
    justify-content: flex-start !important;
    width: calc(240px - 16px) !important;
    margin: 2px 8px !important;
  }
  /* When closed on mobile: keep icons centered */
  .sidebar:not(.open) .nav-item {
    padding-left: calc((58px - 30px) / 2) !important;
  }

  .main { margin-left: 0 !important; }

  /* Home panel mobile */
  .home-header { padding: 52px 20px 28px; }
  .home-title  { font-size: 22px; }
  .home-subtitle { font-size: 13px; }
  .tools-grid { grid-template-columns: 1fr !important; padding: 20px 16px; gap: 12px; }
  .tool-card  { padding: 18px; }

  /* Aforo panel mobile */
  .tool-header { padding: 10px 14px 10px 56px !important; flex-wrap: wrap; gap: 6px; min-height: 52px; }
  .tool-header-title { font-size: 14px; }
  .back-btn { padding: 6px 10px; font-size: 12px; }
}

@media (max-width: 480px) {
  .home-title { font-size: 18px; }
  .home-subtitle { font-size: 13px; }
  .tool-card-title { font-size: 14px; }
  .tool-card { padding: 18px 16px; }
  .home-header { padding: 56px 16px 24px; }
  .tools-grid { padding: 16px 12px; }
}



/* ══════════════════════════════════════════════
   THEME TOGGLE — LIGHT / DARK
══════════════════════════════════════════════ */
html {
  color-scheme: light;
}
html[data-theme="dark"] {
  color-scheme: dark;
  --surface: #0f1a27;
  --surface2: #0b1420;
  --border: #22384f;
  --ink: #e8f1fb;
  --muted: #9bb1c8;
  --shadow: 0 12px 30px rgba(0,0,0,0.32);
}
body {
  background: var(--surface2);
  transition: background 0.25s ease, color 0.25s ease;
}
.main,
.main-content,
.panels,
.panel,
.panel-scroll {
  background: var(--surface2);
  transition: background 0.25s ease, color 0.25s ease;
}
.tool-header,
.tool-card,
.card,
.panel-card,
.results-card,
.summary-card,
.content-card,
.section-card,
.info-card,
.upload-box,
.drop-zone,
.table-wrap,
.sheet-card,
.form-card,
.metric-card,
.resume-card,
.report-card,
.preview-card,
.modal-content {
  transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}
html[data-theme="dark"] .tool-header,
html[data-theme="dark"] .tool-card,
html[data-theme="dark"] .card,
html[data-theme="dark"] .panel-card,
html[data-theme="dark"] .results-card,
html[data-theme="dark"] .summary-card,
html[data-theme="dark"] .content-card,
html[data-theme="dark"] .section-card,
html[data-theme="dark"] .info-card,
html[data-theme="dark"] .upload-box,
html[data-theme="dark"] .drop-zone,
html[data-theme="dark"] .table-wrap,
html[data-theme="dark"] .sheet-card,
html[data-theme="dark"] .form-card,
html[data-theme="dark"] .metric-card,
html[data-theme="dark"] .resume-card,
html[data-theme="dark"] .report-card,
html[data-theme="dark"] .preview-card,
html[data-theme="dark"] .modal-content {
  background: var(--surface) !important;
  color: var(--ink) !important;
  border-color: var(--border) !important;
  box-shadow: var(--shadow);
}
html[data-theme="dark"] .home-header {
  background: linear-gradient(105deg, #08121d 0%, #0b2847 58%, #0f4b86 100%) !important;
}
html[data-theme="dark"] .home-header::after {
  background: radial-gradient(circle, rgba(58,157,232,0.18) 0%, transparent 72%) !important;
}
html[data-theme="dark"] .tool-card-icon.blue {
  background: linear-gradient(135deg, rgba(14,95,168,0.28), rgba(58,157,232,0.18)) !important;
}
html[data-theme="dark"] .tool-card-icon.gold {
  background: linear-gradient(135deg, rgba(201,146,42,0.22), rgba(201,146,42,0.10)) !important;
}
html[data-theme="dark"] .tool-card-tag.ai {
  background: rgba(14,95,168,0.22) !important;
  color: #8ec7ff !important;
}
html[data-theme="dark"] .tool-card-tag.calc {
  background: rgba(201,146,42,0.16) !important;
  color: #f1cb7f !important;
}
html[data-theme="dark"] .tool-card-arrow {
  background: rgba(255,255,255,0.06) !important;
  color: var(--muted) !important;
}
html[data-theme="dark"] .tool-card:hover .tool-card-arrow {
  background: var(--blue) !important;
  color: #fff !important;
}
html[data-theme="dark"] input,
html[data-theme="dark"] select,
html[data-theme="dark"] textarea {
  background: #0b1623 !important;
  color: var(--ink) !important;
  border-color: var(--border) !important;
}
html[data-theme="dark"] input::placeholder,
html[data-theme="dark"] textarea::placeholder {
  color: #7f97b0 !important;
}
html[data-theme="dark"] button,
html[data-theme="dark"] .btn,
html[data-theme="dark"] .back-btn {
  border-color: var(--border);
}
html[data-theme="dark"] .back-btn {
  background: rgba(255,255,255,0.03) !important;
  color: var(--ink) !important;
}
html[data-theme="dark"] table,
html[data-theme="dark"] th,
html[data-theme="dark"] td {
  border-color: var(--border) !important;
  color: var(--ink) !important;
}
html[data-theme="dark"] th {
  background: rgba(58,157,232,0.12) !important;
}
html[data-theme="dark"] tr:nth-child(even) td {
  background: rgba(255,255,255,0.02) !important;
}
html[data-theme="dark"] .sidebar {
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.05);
}
.theme-toggle {
  width: calc(100% - 16px);
  margin: 8px;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.92);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
}
.theme-toggle:hover {
  background: rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.16);
}
.theme-toggle:active {
  transform: scale(0.98);
}
.theme-toggle-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.09);
  font-size: 15px;
  flex-shrink: 0;
}
.theme-toggle-copy {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.theme-toggle-label {
  font-size: 12px;
  font-weight: 600;
  line-height: 1.2;
}
.theme-toggle-state {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.48);
  margin-top: 2px;
}
.sidebar:not(:hover) .theme-toggle {
  width: 42px;
  height: 42px;
  margin: 8px auto;
  padding: 0;
  justify-content: center;
}
.sidebar:not(:hover) .theme-toggle-copy {
  display: none;
}
html[data-theme="dark"] #panel-pagare .panel-scroll,
html[data-theme="dark"] #panel-aforo .panel-scroll,
html[data-theme="dark"] #panel-calc .panel-scroll,
html[data-theme="dark"] #panel-bitacora .panel-scroll {
  background: var(--surface2) !important;
}
@media (max-width: 768px) {
  .theme-toggle {
    width: calc(100% - 16px) !important;
    height: auto !important;
    margin: 8px !important;
    padding: 10px 12px !important;
    justify-content: flex-start !important;
  }
  .theme-toggle-copy {
    display: flex !important;
  }
}

/* === SIDEBAR FINAL ALIGNMENT + TPK === */
.sidebar-logo {
  position: relative;
  min-height: 78px;
}
.sidebar-logo::before {
  content: none !important;
  display: none !important;
}
.sidebar-logo-full {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}
.sidebar:hover .sidebar-logo-full {
  opacity: 1;
  pointer-events: auto;
}
.sidebar-logo-full img {
  height: 208px;
  width: auto;
  display: block;
  mix-blend-mode: screen;
}
.sidebar-logo-mini {
  position: absolute;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--blue), var(--blue3));
  color: #fff;
  font: 800 13px/1 "DM Sans", sans-serif;
  letter-spacing: 0.03em;
  opacity: 1;
  transition: opacity 0.15s ease;
  pointer-events: none;
}
.sidebar:hover .sidebar-logo-mini {
  opacity: 0;
  pointer-events: none;
}
.sidebar:not(:hover):not(.open) .sidebar-logo {
  justify-content: center !important;
  padding: 16px 0 !important;
}
.sidebar:not(:hover):not(.open) .sidebar-logo-full {
  display: none !important;
}
.sidebar:not(:hover):not(.open) .sidebar-logo-mini {
  display: flex !important;
}
.sidebar:not(:hover):not(.open) .nav-item {
  justify-content: center !important;
  padding: 10px 0 !important;
  gap: 0 !important;
}
.sidebar:not(:hover):not(.open) .nav-item > span:not(.nav-icon),
.sidebar:not(:hover):not(.open) .nav-badge {
  display: none !important;
}
.sidebar:not(:hover):not(.open) .nav-icon {
  margin: 0 auto !important;
}
.sidebar.open .sidebar-logo-full {
  display: flex !important;
}
.sidebar.open .sidebar-logo-mini {
  display: none !important;
}
.sidebar.open .nav-item {
  justify-content: flex-start !important;
  gap: 11px !important;

// ─── HELPERS ───
function formatMoney(n) {
  if (n == null || isNaN(n)) return "$0.00";
  return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(d) {
  if (!d) return "";
  if (d instanceof Date) {
    return d.toISOString().split("T")[0];
  }
  return String(d).split("T")[0].split(" ")[0];
}

function todayStr() {
  return new Date().toISOString().split("T")[0];
}

function getMonthKey(dateStr) {
  if (!dateStr) return "";
  const parts = String(dateStr).split("-");
  return parts[0] + "-" + parts[1];
}

function normalizeHeader(value) {
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase()
    .replace(/\s+/g, " ")
    .trim();
}

function parseAmount(value) {
  if (value == null || value === "" || value === "--") return 0;
  if (typeof value === "number") return Number.isFinite(value) ? value : 0;

  let str = String(value).trim();
  if (!str || str === "--") return 0;

  let negative = false;
  if (str.startsWith("(") && str.endsWith(")")) {
    negative = true;
    str = str.slice(1, -1);
  }

  str = str
    .replace(/\$/g, "")
    .replace(/,/g, "")
    .replace(/\s+/g, "")
    .replace(/[^0-9.-]/g, "");

  if (!str || str === "-" || str === ".") return 0;

  const n = Number(str);
  if (!Number.isFinite(n)) return 0;
  return negative ? -Math.abs(n) : n;
}

function findHeaderIndex(headers, candidates) {
  const normalized = headers.map(normalizeHeader);
  for (const candidate of candidates) {
    const idx = normalized.indexOf(normalizeHeader(candidate));
    if (idx !== -1) return idx;
  }
  return -1;
}

function extractStageRank(value) {
  const txt = normalizeHeader(value);
  const match = txt.match(/ETAPA\s*(\d+)/);
  return match ? Number(match[1]) : 0;
}

function stageLabelFromRank(rank) {
  return rank > 0 ? `ETAPA ${rank}` : "";
}

function pickMostFrequent(counterObj) {
  const entries = Object.entries(counterObj || {}).filter(([k]) => k && k !== "--");
  if (!entries.length) return "";
  entries.sort((a, b) => {
    if (b[1] !== a[1]) return b[1] - a[1];
    return a[0].localeCompare(b[0]);
  });
  return entries[0][0];
}

function addCount(counterObj, value) {
  const key = String(value || "").trim();
  if (!key || key === "--") return;
  counterObj[key] = (counterObj[key] || 0) + 1;
}

function getImpagoColumnIndexes(headers) {
  const impagoHeaders = [
    "SALDO CAPITAL IMPAGO",
    "SALDO CAPITAL VENCIDO EXIGIBLE",
    "SALDO CAPITAL VENCIDO NO EXIGIBLE",
    "SALDO INTERES ORDINARIO IMPAGO",
    "SALDO IVA INTERES ORDINARIO IMPAGO",
    "SALDO INTERES ORDINARIO VENCIDO EXIGIBLE",
    "SALDO IVA INTERES ORDINARIO VENCIDO EXIGIBLE",
    "SALDO INTERES ORDINARIO VENCIDO NO EXIGIBLE",
    "SALDO IVA INTERES ORDINARIO VENCIDO NO EXIGIBLE",
    "SALDO INTERES REFINANCIADO IMPAGO",
    "SALDO INTERES REFINANCIADO VENCIDO EXIGIBLE",
    "SALDO INTERES REFINANCIADO VENCIDO NO EXIGIBLE",
    "SALDO INTERES MORATORIO CALCULADO",
    "SALDO IVA INTERES MORATORIO CALCULADO"
  ];

  return impagoHeaders
    .map(name => findHeaderIndex(headers, [name]))
    .filter(idx => idx >= 0);
}

function sumRowImpago(row, impagoIndexes) {
  return impagoIndexes.reduce((sum, idx) => sum + parseAmount(row[idx]), 0);
}

// ─── XLSX PARSER (minimal) ───
async function parseXLSX(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
        resolve(data);
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error("Error reading file"));
    reader.readAsArrayBuffer(file);
  });
}

async function exportToXLSX(gestiones, filename) {
  const headers = [
    "Folio Cliente", "Fecha de Gestión", "Ejecutivo", "Cliente",
    "Reincidente", "Etapa", "Monto en Impago Total", "Área Responsable", "Saldo Neto Total",
    "Tipo de Gestión", "Impago", "Estado de la Gestión", "Fecha Compromiso de Pago",
    "Toque", "Siguiente Acción", "Prioridad", "Comentario"
  ];
  const rows = gestiones.map(g => [
    g.folioCliente, g.fechaGestion, g.ejecutivo, g.cliente,
    g.reincidente, g.etapa, g.montoImpago, g.areaResponsable, g.saldoNeto,
    g.tipoGestion, g.impago, g.estadoGestion, g.fechaCompromiso,
    g.toque, g.siguienteAccion, g.prioridad, g.comentario
  ]);
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  
  // Column widths
  ws["!cols"] = headers.map((h, i) => ({ wch: i === 16 ? 50 : Math.max(h.length + 4, 16) }));
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Gestiones");
  XLSX.writeFile(wb, filename);
}

// ─── STORAGE HELPERS ───
function getAuthToken() {
  try { return localStorage.getItem(AUTH_TOKEN_KEY) || ""; } catch { return ""; }
}

function setAuthToken(token) {
  try {
    if (token) localStorage.setItem(AUTH_TOKEN_KEY, token);
    else localStorage.removeItem(AUTH_TOKEN_KEY);
  } catch {}
}

async function apiFetch(url, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (options.body && !headers["Content-Type"]) {
    headers["Content-Type"] = "application/json";
  }

  const token = getAuthToken();
  if (token) headers["Authorization"] = `Bearer ${token}`;

  const response = await fetch(API_BASE + url, { ...options, headers });
  let data = null;
  try { data = await response.json(); } catch {}

  if (!response.ok) {
    const error = new Error(data?.error || `Error HTTP ${response.status}`);
    error.status = response.status;
    throw error;
  }

  return data;
}

function getLegacyGestiones() {
  try {
    const raw = localStorage.getItem(LEGACY_STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}

async function loginBitacora(user, pass) {
  const data = await apiFetch("/api/bitacora/login", {
    method: "POST",
    body: JSON.stringify({ user, pass })
  });

  if (!data?.token) {
    throw new Error("No se recibió token de sesión");
  }

  setAuthToken(data.token);
  return data;
}

async function loadGestiones() {

}

async function createGestion(record) {

}

function Toast({ message, type, onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, [onClose]);
  return <div className={`toast ${type}`}>{type === "success" ? "✓" : "✕"} {message}</div>;
}

function LoginScreen({ onLogin, loadingSession = false }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [error, setError] = useState("");
  const [submitting, setSubmitting] = useState(false);

  const handleLogin = async () => {
    if (submitting || loadingSession) return;

    try {
      setError("");
      setSubmitting(true);
      await onLogin(user.trim(), pass);
    } catch (e) {
      setError(e?.message || "No fue posible iniciar sesión");
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div className="login-screen">
      <div className="login-card">
        <h1>Bitácora de Gestiones</h1>
        <p className="subtitle">Proaktiva · Control de Cobranza</p>
        {error && <div className="login-error">{error}</div>}
        <label>Usuario</label>
        <input
          type="text" placeholder="usuario"
          value={user} onChange={e => { setUser(e.target.value); setError(""); }}
          onKeyDown={e => e.key === "Enter" && handleLogin()}
        />
        <label>Contraseña</label>
        <input
          type="password" placeholder="••••••••"
          value={pass} onChange={e => { setPass(e.target.value); setError(""); }}
          onKeyDown={e => e.key === "Enter" && handleLogin()}
        />
        <button className="login-btn" onClick={handleLogin} disabled={submitting || loadingSession}>
          {loadingSession ? "Validando..." : submitting ? "Ingresando..." : "Iniciar Sesión"}
        </button>
      </div>
    </div>
  );
}

function ClientSelector({ clients, selected, onSelect, onClear }) {
  const [search, setSearch] = useState("");
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  const filtered = useMemo(() => {
    if (!search.trim()) return clients.slice(0, 30);
    const q = search.toLowerCase();
    return clients.filter(c =>
      c.nombre.toLowerCase().includes(q) || String(c.folio).includes(q)
    ).slice(0, 30);
  }, [clients, search]);

  useEffect(() => {
    const handleClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  if (selected) {
    return (
      <div className="selected-client-card">
        <div className="info">
          <h4>{selected.nombre}</h4>
          <p>Folio: {selected.folio} · {selected.etapa} · Saldo Neto: {formatMoney(selected.saldoNeto)}</p>
        </div>
        <button className="clear-btn" onClick={onClear}>✕ Cambiar</button>
      </div>
    );
  }

  return (
    <div className="client-search-wrap" ref={ref}>
      <div className="form-group">
        <label>Buscar Cliente (Nombre o Folio)</label>
        <input
          type="text"
          placeholder="Escribe nombre o folio del cliente..."
          value={search}
          onChange={e => { setSearch(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}
        />
      </div>
      {open && filtered.length > 0 && (
        <div className="client-dropdown">
          {filtered.map((c, i) => (
            <div key={i} className="item" onClick={() => { onSelect(c); setOpen(false); setSearch(""); }}>
              <div className="name">{c.nombre}</div>
              <div className="meta">Folio: {c.folio} · {c.etapa} · Impago: {formatMoney(c.montoImpago)} · Saldo: {formatMoney(c.saldoNeto)}</div>
            </div>
          ))}
        </div>
      )}
      {open && filtered.length === 0 && search.trim() && (
        <div className="client-dropdown">
          <div className="item"><div className="meta">Sin resultados</div></div>
        </div>
      )}
    </div>
  );
}

                    <th>Toque</th>
                    <th>Prioridad</th>
                    <th>Monto Impago</th>
                    <th>Saldo Neto</th>
                    <th>Compromiso</th>
                    <th>Sig. Acción</th>
                    <th>Comentario</th>
                  </tr>
                </thead>
                <tbody>
                  {paginated.map(g => (
                    <tr key={g.id}>
                      <td style={{ color: "var(--text)", fontWeight: 500 }}>{g.fechaGestion}</td>
                      <td>{g.folioCliente}</td>
                      <td style={{ maxWidth: 180 }} title={g.cliente}>{g.cliente}</td>
                      <td>
                        <span className={`badge ${g.etapa === "ETAPA 1" ? "badge-etapa1" : g.etapa === "ETAPA 2" ? "badge-etapa2" : "badge-etapa3"}`}>
                          {g.etapa}
                        </span>
                      </td>
                      <td>{g.tipoGestion}</td>
                      <td style={{ maxWidth: 160 }} title={g.estadoGestion}>{g.estadoGestion}</td>
                      <td>
                        <span className={`toque-badge ${(g.toque === "+4" || Number(g.toque) >= 4) ? "high" : ""}`}>
                          {g.toque}
                        </span>
                      </td>
                      <td>
                        <span className={`badge badge-${g.prioridad.toLowerCase()}`}>{g.prioridad}</span>
                      </td>
                      <td>{formatMoney(g.montoImpago)}</td>
                      <td>{formatMoney(g.saldoNeto)}</td>
                      <td style={{ maxWidth: 130 }}>{g.fechaCompromiso}</td>
                      <td style={{ maxWidth: 130 }}>{g.siguienteAccion}</td>
                      <td style={{ maxWidth: 220 }} title={g.comentario}>{g.comentario}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="pagination">
              <button className="page-btn" disabled={page === 1} onClick={() => setPage(p => p - 1)}>← Anterior</button>
              {Array.from({ length: Math.min(totalPages, 7) }, (_, i) => {
                let p;
                if (totalPages <= 7) p = i + 1;
                else if (page <= 4) p = i + 1;
                else if (page >= totalPages - 3) p = totalPages - 6 + i;
                else p = page - 3 + i;
                return (
                  <button key={p} className={`page-btn ${p === page ? "active" : ""}`} onClick={() => setPage(p)}>
                    {p}
                  </button>
                );
              })}
              <button className="page-btn" disabled={page === totalPages} onClick={() => setPage(p => p + 1)}>Siguiente →</button>
              <span style={{ fontSize: 11, color: "var(--text3)", marginLeft: 8 }}>
                {filtered.length} registros
              </span>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [view, setView] = useState("registro");
  const [carteraClients, setCarteraClients] = useState([]);
  const [carteraFileName, setCarteraFileName] = useState("");
  const [gestiones, setGestiones] = useState([]);
  const [toastData, setToastData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [authChecking, setAuthChecking] = useState(true);
  const [storageStatus, setStorageStatus] = useState({ label: "Verificando", mode: "loading", ok: false });
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);

  const showToast = useCallback((msg, type = "success") => {
    setToastData({ msg, type });
  }, []);


const refreshStorageStatus = useCallback(async () => {
  try {
    const status = await getBitacoraStatus();
    const isPg = String(status?.storage || '').toLowerCase() === 'postgres';
    const connected = Boolean(status?.connected);
    setStorageStatus({
      label: isPg ? (connected ? 'Postgres conectado' : 'Postgres sin conexión') : 'JSON local',
      mode: !isPg ? 'local' : connected ? 'ok' : 'error',
      ok: isPg && connected
    });
  } catch (e) {
    setStorageStatus({ label: 'Estado no disponible', mode: 'error', ok: false });
  }
}, []);

useEffect(() => {
  refreshStorageStatus();
}, [refreshStorageStatus]);

  const hydrateGestiones = useCallback(async () => {
    const cloudGestiones = await loadGestiones();
    const legacyGestiones = getLegacyGestiones();

    if (cloudGestiones.length === 0 && legacyGestiones.length > 0) {
      const shouldMigrate = window.confirm(
        `Se encontraron ${legacyGestiones.length} gestiones guardadas solo en este dispositivo. ¿Deseas migrarlas a la nube para consultarlas desde cualquier equipo?`
      );

      if (shouldMigrate) {
        const migrated = await importLegacyGestiones(legacyGestiones);
        try {
          localStorage.setItem(LEGACY_STORAGE_KEY + "-backup", JSON.stringify(legacyGestiones));
          localStorage.removeItem(LEGACY_STORAGE_KEY);
        } catch {}
        showToast(`Se migraron ${migrated.length} gestiones a la nube`, "success");
        return migrated;
      }
    }

    return cloudGestiones;
  }, [showToast]);

  useEffect(() => {
    (async () => {
      try {
        const token = getAuthToken();
        if (!token) return;

        setLoading(true);
        const remoteGestiones = await hydrateGestiones();
        setGestiones(remoteGestiones);
        setLoggedIn(true);
      } catch (e) {
        setAuthToken("");
        setGestiones([]);
        setLoggedIn(false);
      } finally {
        setLoading(false);
        setAuthChecking(false);
      }
    })();
  }, [hydrateGestiones]);

  const handleLogin = useCallback(async (user, pass) => {
    setLoading(true);
    try {
      await loginBitacora(user, pass);
      await refreshStorageStatus();
      const remoteGestiones = await hydrateGestiones();
      setGestiones(remoteGestiones);
      setLoggedIn(true);
    } finally {
      setLoading(false);
      setAuthChecking(false);
    }
  }, [hydrateGestiones, refreshStorageStatus]);

  const processCartera = useCallback(async (file) => {
    try {
      setLoading(true);
      const rows = await parseXLSX(file);
      if (rows.length < 2) throw new Error("Archivo vacío");

      // Find header row
      let headerIdx = 0;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        const row = rows[i];
        if (row && row.some(c => normalizeHeader(c).includes("FOLIO CLIENTE"))) {
          headerIdx = i;
          break;
        }
      }

      const headers = rows[headerIdx].map(h => String(h || "").trim());

      const colMap = {
        cliente: findHeaderIndex(headers, ["CLIENTE"]),
        folio: findHeaderIndex(headers, ["FOLIO CLIENTE"]),
        rfc: findHeaderIndex(headers, ["RFC"]),
        localidad: findHeaderIndex(headers, ["LOCALIDAD"]),
        estado: findHeaderIndex(headers, ["ESTADO"]),
        sucursal: findHeaderIndex(headers, ["SUCURSAL"]),
        status: findHeaderIndex(headers, ["STATUS"]),
        statusCobranza: findHeaderIndex(headers, ["STATUS DE COBRANZA"]),
        ifrs9: findHeaderIndex(headers, ["IFRS9"]),
        diasImpago: findHeaderIndex(headers, ["DÍAS DE IMPAGO", "DIAS DE IMPAGO"]),
        saldoNeto: findHeaderIndex(headers, ["SALDO NETO"]),
        ejecutivoLinea: findHeaderIndex(headers, ["EJECUTIVO LÍNEA", "EJECUTIVO LINEA"]),
        ejecutivoDisposicion: findHeaderIndex(headers, ["EJECUTIVO DISPOSICIÓN", "EJECUTIVO DISPOSICION"]),
      };

      if (colMap.folio < 0 || colMap.cliente < 0) {
        throw new Error("No se encontraron las columnas clave de CLIENTE / FOLIO CLIENTE en la cartera.");
      }

      const impagoIndexes = getImpagoColumnIndexes(headers);
      if (!impagoIndexes.length) {
        throw new Error("No se encontraron columnas de impago/vencido en la cartera.");
      }

      const clientMap = {};
      for (let i = headerIdx + 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || row.length === 0) continue;

        const folio = String(row[colMap.folio] || "").trim();
        if (!folio || folio === "--") continue;

        if (!clientMap[folio]) {
          clientMap[folio] = {
            folio,
            nombre: String(row[colMap.cliente] || "").trim(),
            rfc: colMap.rfc >= 0 ? String(row[colMap.rfc] || "").trim() : "",
            localidad: colMap.localidad >= 0 ? String(row[colMap.localidad] || "").trim() : "",
            estado: colMap.estado >= 0 ? String(row[colMap.estado] || "").trim() : "",
            sucursal: colMap.sucursal >= 0 ? String(row[colMap.sucursal] || "").trim() : "",
            status: colMap.status >= 0 ? String(row[colMap.status] || "").trim() : "",
            statusCobranza: colMap.statusCobranza >= 0 ? String(row[colMap.statusCobranza] || "").trim() : "",
            etapa: "",
            etapaRank: 0,
            diasImpago: 0,
            montoImpago: 0,
            saldoNeto: 0,
            ejecutivo: "",
            _execLinea: {},
            _execDisposicion: {},
          };
        }

        const client = clientMap[folio];

        const rowImpago = sumRowImpago(row, impagoIndexes);
        client.montoImpago += rowImpago;
        client.saldoNeto += colMap.saldoNeto >= 0 ? parseAmount(row[colMap.saldoNeto]) : 0;

        const etapaTexto = colMap.ifrs9 >= 0 ? String(row[colMap.ifrs9] || "").trim() : "";
        const etapaRank = extractStageRank(etapaTexto);
        if (etapaRank > client.etapaRank) {
          client.etapaRank = etapaRank;
          client.etapa = stageLabelFromRank(etapaRank) || etapaTexto;
        } else if (!client.etapa && etapaTexto) {
          client.etapa = etapaTexto;
        }

        const dias = colMap.diasImpago >= 0 ? parseAmount(row[colMap.diasImpago]) : 0;
        if (dias > client.diasImpago) client.diasImpago = dias;

        if (colMap.ejecutivoLinea >= 0) addCount(client._execLinea, row[colMap.ejecutivoLinea]);
        if (colMap.ejecutivoDisposicion >= 0) addCount(client._execDisposicion, row[colMap.ejecutivoDisposicion]);
      }

      const clients = Object.values(clientMap)
        .map(client => {
          client.ejecutivo = pickMostFrequent(client._execLinea) || pickMostFrequent(client._execDisposicion) || EXEC_NAME;
          delete client._execLinea;
          delete client._execDisposicion;
          delete client.etapaRank;
          client.montoImpago = Number(client.montoImpago.toFixed(2));
          client.saldoNeto = Number(client.saldoNeto.toFixed(2));
          client.diasImpago = Math.round(client.diasImpago || 0);
          if (!client.etapa) client.etapa = "ETAPA 1";
          return client;
        })
        .sort((a, b) => a.nombre.localeCompare(b.nombre));

      setCarteraClients(clients);
      setCarteraFileName(file.name);
      showToast(`Cartera cargada: ${clients.length} clientes encontrados`, "success");
    } catch (e) {
      showToast("Error al procesar archivo: " + e.message, "error");
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  const handleFileDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer?.files?.[0] || e.target?.files?.[0];
    if (file && (file.name.endsWith(".xlsx") || file.name.endsWith(".xls"))) {
      processCartera(file);
    } else {
      showToast("Solo se aceptan archivos .xlsx", "error");
    }
  }, [processCartera, showToast]);

  const handleSaveGestion = useCallback(async (record) => {
    try {
      setLoading(true);
      const saved = await createGestion(record);
      setGestiones(prev => [saved, ...prev.filter(g => g.id !== saved.id)]);
      showToast("Gestión registrada exitosamente", "success");
    } catch (e) {
      if (e?.status === 401) {
        setAuthToken("");
        setLoggedIn(false);
        setGestiones([]);
        showToast("Tu sesión expiró. Inicia sesión nuevamente.", "error");
        return;
      }
      showToast("No fue posible guardar la gestión: " + (e?.message || "Error desconocido"), "error");
    } finally {
      setLoading(false);
    }
  }, [showToast]);

  const handleDeleteAll = useCallback(async () => {
    if (confirm("¿Estás seguro de eliminar TODAS las gestiones? Esta acción no se puede deshacer.")) {
      try {
        setLoading(true);
        await clearGestionesCloud();
        setGestiones([]);
        showToast("Todas las gestiones fueron eliminadas", "success");
      } catch (e) {
        if (e?.status === 401) {
          setAuthToken("");
          setLoggedIn(false);
          setGestiones([]);
          showToast("Tu sesión expiró. Inicia sesión nuevamente.", "error");
          return;
        }
        showToast("No fue posible eliminar las gestiones: " + (e?.message || "Error desconocido"), "error");
      } finally {
        setLoading(false);
      }
    }
  }, [showToast]);

  if (!loggedIn) return (
    <>
      <style>{css}</style>
      <LoginScreen onLogin={handleLogin} loadingSession={authChecking || loading} />
    </>
  );

  return (
    <>
      <style>{css}</style>
      <div className="app-wrap">
        <header className="header">
          <div className="header-brand">
            <div className="logo">P</div>
            <h2>Bitácora de Gestiones</h2>
          </div>
          <nav className="header-nav">
            <button className={`nav-btn ${view === "registro" ? "active" : ""}`} onClick={() => setView("registro")}>
              Registrar
            </button>
            <button className={`nav-btn ${view === "historial" ? "active" : ""}`} onClick={() => setView("historial")}>
              Historial
            </button>
            <button className={`nav-btn ${view === "cartera" ? "active" : ""}`} onClick={() => setView("cartera")}>
              Cartera
            </button>
          </nav>
          <div className="header-right">
            <div className={`storage-pill ${storageStatus.mode}`} title="Estado del almacenamiento de la bitácora">
              <span className="dot"></span>
              <span><strong>{storageStatus.label}</strong></span>
            </div>
            <div className="user-badge">
              <div className="user-avatar">GB</div>
              <span>Gerardo B.</span>
            </div>
            <button className="logout-btn" onClick={() => { setAuthToken(""); setLoggedIn(false); setGestiones([]); }}>Cerrar Sesión</button>
          </div>
        </header>

        <main className="main">
          {view === "cartera" && (
            <div>
              <input
                ref={fileRef}
                type="file"
                accept=".xlsx,.xls"
                style={{ display: "none" }}
                onChange={handleFileDrop}
              />
              <div
                className={`upload-zone ${dragOver ? "drag-over" : ""}`}
                onClick={() => fileRef.current?.click()}
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleFileDrop}
              >
                <div className="icon">📁</div>
                <h3>Subir Cartera Activa</h3>
                <p>Arrastra el archivo .xlsx o haz clic para seleccionar</p>
              </div>

              {carteraFileName && (
                <div className="upload-status">
                  ✓ {carteraFileName} — {carteraClients.length} clientes cargados
                </div>
              )}

              {carteraClients.length > 0 && (
                <div className="table-section">
                  <div className="table-header">
                    <h3>Clientes en Cartera ({carteraClients.length})</h3>
                  </div>
                  <div className="table-wrap">
                    <table>
                      <thead>
                        <tr>
                          <th>Folio</th>
                          <th>Cliente</th>
                          <th>Etapa</th>
                          <th>Status</th>
                          <th>Días Impago</th>
                          <th>Monto Impago</th>
                          <th>Saldo Neto</th>
                          <th>Localidad</th>
                        </tr>
                      </thead>
                      <tbody>
                        {carteraClients.map(c => (
                          <tr key={c.folio}>
                            <td style={{ color: "var(--text)", fontWeight: 500 }}>{c.folio}</td>
                            <td style={{ maxWidth: 200 }} title={c.nombre}>{c.nombre}</td>
                            <td>
                              <span className={`badge ${c.etapa.includes("1") ? "badge-etapa1" : c.etapa.includes("2") ? "badge-etapa2" : "badge-etapa3"}`}>
                                {c.etapa}
                              </span>
                            </td>
                            <td>{c.status}</td>
                            <td>{c.diasImpago}</td>
                            <td>{formatMoney(c.montoImpago)}</td>
                            <td>{formatMoney(c.saldoNeto)}</td>
                            <td>{c.localidad}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          )}

          {view === "registro" && (
            <RegistroView
              carteraClients={carteraClients}
              gestiones={gestiones}
              onSave={handleSaveGestion}
              toast={showToast}
            />
          )}

          {view === "historial" && (
            <HistorialView gestiones={gestiones} toast={showToast} />
          )}
        </main>
      </div>

      {toastData && (
        <Toast message={toastData.msg} type={toastData.type} onClose={() => setToastData(null)} />
      )}
    </>
  );
}

<script>
(function () {
  'use strict';

  // ── CONFIG ────────────────────────────────────────────────────────────────
  var WIDGET_ID   = 'pkAsistente';
  var MODEL       = 'claude-sonnet-4-20250514';
  var MAX_TOKENS  = 1024;
  var MAX_HISTORY = 20; // mensajes máximos en contexto

  var SYSTEM_PROMPT = `Eres el Proaktibot, una empresa financiera mexicana regulada como SOFOM ENR (Sociedad Financiera de Objeto Múltiple, Entidad No Regulada). Respondes con un tono profesional, amable y directo. Siempre en español.

## SOBRE PROAKTIVA Y TOOLSPK
ToolsPK es el portal interno de Proaktiva que contiene las siguientes herramientas:

1. **Revisión de Pagarés (IA)** — Sube el PDF del pagaré y el contrato de crédito. La IA analiza y compara campos críticos como nombre del suscriptor, monto, tasa, fecha, vencimiento, avales, firmas y razón social. Emite hallazgos clasificados como ERROR, ADVERTENCIA, OK o COMENTARIO con explicaciones detalladas.

2. **Aforo de Garantía** — Calcula el aforo (porcentaje de valor asignable a una garantía) de activos. Sube el documento o ingresa los datos manualmente. Genera un reporte PDF con el análisis.

3. **Calculadora de Crédito** — Simula tablas de amortización con tres esquemas: Capital Creciente (pagos fijos), Capital Fijo (capital constante, interés decreciente) y Bullet/Diferido (solo intereses hasta un período, luego amortización). Incluye obtención automática de la tasa TIIE desde Banxico, presets de spread para PyME (+16.4 pts) y Agro (+15.4 pts), periodicidades independientes para capital e intereses, y período de gracia.

4. **Bitácora de Gestiones** — Herramienta interna de uso exclusivo del equipo operativo. No puedes proporcionar información sobre su funcionamiento, contenido, registros ni datos almacenados.

## CONOCIMIENTO FINANCIERO QUE DEBES DOMINAR
- **Pagarés**: título de crédito mexicano regulado por la LGTOC. Elementos esenciales: mención de ser pagaré, promesa incondicional de pago, nombre del beneficiario, suma determinada, fecha y lugar de pago, fecha y lugar de suscripción, firma del suscriptor.
- **SOFOM**: entidad financiera que puede otorgar crédito, factoraje y arrendamiento sin captar recursos del público. ENR = no regulada directamente por CNBV pero supervisada en materia antilavado.
- **Tasas**: TIIE (Tasa de Interés Interbancaria de Equilibrio) es la tasa de referencia en México, publicada por Banxico. Los créditos suelen pactarse como TIIE + spread.
- **Amortización Capital Creciente (Francés)**: cuota total fija, al inicio el pago es principalmente interés y al final principalmente capital.
- **Amortización Capital Fijo (Alemán)**: capital constante por período, interés decrece, cuota total decrece.
- **Bullet/Diferido**: solo se pagan intereses hasta el período definido, el capital se amortiza en el último período o mediante annuity desde un período determinado.
- **Período de gracia**: meses iniciales donde no se amortiza capital (solo intereses).
- **Aforo**: porcentaje del valor comercial de una garantía que se acepta como respaldo del crédito. P.ej. aforo del 70% sobre un inmueble de $1M = $700K como garantía efectiva.
- **Aval / Obligado solidario**: persona física o moral que garantiza solidariamente la deuda del acreditado.
- **Razón social**: nombre legal completo de una empresa. S. de R.L. de C.V. y S. de R.L. de C.V. son iguales; S. de R.L. de C.V. y S.A. de C.V. son distintas.

## REGLAS
- Si no sabes algo con certeza, dilo claramente.
- No inventes tasas, montos ni fechas específicas.
- Puedes hacer cálculos simples de tasas, intereses y amortizaciones si el usuario te proporciona los datos.
- Si una pregunta es muy técnica o legal, recomienda consultar con el equipo de análisis o legal de Proaktiva.
- Sé conciso: respuestas de 2-4 párrafos máximo salvo que se pida más detalle.

## RESTRICCIONES DE SEGURIDAD — ABSOLUTAS
Las siguientes áreas están completamente fuera de tu alcance. Ante cualquier pregunta relacionada, responde únicamente: "Esa información es de uso interno exclusivo del equipo de Proaktiva y no puedo proporcionarla." No ofrezcas alternativas ni expliques por qué.

  function now() {
    return new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // simple markdown → html
  function renderMd(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<strong>$1</strong>')
      .replace(/^## (.+)$/gm, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[uol]|<\/[uol]|<str|<em|<p|<\/p)(.+)$/gm, '<p>$1</p>')
      .replace(/<p><\/p>/g, '');
  }

  function scrollBottom() {
    setTimeout(function(){ messages.scrollTop = messages.scrollHeight; }, 30);
  }

  function addMessage(role, text) {
    var div   = document.createElement('div');
    div.className = 'pka-msg ' + role;
    var bubble = document.createElement('div');
    bubble.className = 'pka-bubble';
    bubble.innerHTML = role === 'bot' ? renderMd(text) : escHtml(text);
    var time = document.createElement('div');
    time.className = 'pka-time';
    time.textContent = now();
    div.appendChild(bubble);
    div.appendChild(time);
    messages.appendChild(div);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    var div = document.createElement('div');
    div.className = 'pka-msg bot';
    div.id = 'pkATyping';

    var t = document.getElementById('pkATyping');

  var SUGGESTIONS = [

  function showWelcome() {
    if (hasShownWelcome) return;

      + '</div></div>'
      + '<div class="pka-time">' + now() + '</div>';

    div.querySelectorAll('.pka-sugg-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        sendMessage(btn.textContent);

    });
    messages.appendChild(div);
    scrollBottom();
  }

  // ── SEND MESSAGE ──────────────────────────────────────────────────────────
  async function sendMessage(text) {
    text = (text || input.value).trim();
    if (!text || isTyping) return;

    input.value = '';
    autoResize();

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    // Trim history to max
    if (history.length > MAX_HISTORY) {
      history = history.slice(history.length - MAX_HISTORY);
    }

    setInputLock(true);
    showTyping();
    dot.classList.remove('visible');

    try {
      var res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: MAX_TOKENS,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error ' + res.status);

      var reply = (data.content || []).map(function(b){ return b.text || ''; }).join('').trim();
      if (!reply) throw new Error('Respuesta vacía');

      history.push({ role: 'assistant', content: reply });

      hideTyping();
      addMessage('bot', reply);

    } catch (err) {
      hideTyping();
      addMessage('bot', '⚠️ Lo siento, ocurrió un error al procesar tu mensaje. Por favor intenta de nuevo en unos segundos.');
      history.pop(); // remove failed user message from history
      console.error('Asistente error:', err);
    }

    setInputLock(false);
    input.focus();
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', function() { sendMessage(); });

  // ── TOGGLE OPEN/CLOSE ─────────────────────────────────────────────────────
  document.getElementById('pkABtn').addEventListener('click', function() {
    isOpen = !isOpen;
    wrap.classList.toggle('open', isOpen);
    dot.classList.remove('visible');
    if (isOpen) {
      showWelcome();
      setTimeout(function(){ input.focus(); }, 250);
    }
  });

    history = [];
    messages.innerHTML = '';

    if (!isOpen) dot.classList.add('visible');
  }, 3000);
